<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>httpOwl</title>
  <link rel="stylesheet" href="./popup/popup.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="brand">
        <svg width="22" height="22" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="12" fill="#f57c00"/>
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="white"/>
        </svg>
        <div class="brand-text">
          <span class="brand-name">httpOwl</span>
          <span class="brand-sub">httpYac for browser</span>
        </div>
      </div>
      <div class="header-btns">
        <button id="rescanBtn" class="btn btn-secondary">Re-scan</button>
        <button id="runAllBtn" class="btn btn-success" disabled>Run All</button>
      </div>
    </header>

    <div id="statsBar" class="stats-bar hidden">
      <span id="statTotal" class="stat"></span>
      <span id="statOk"    class="stat ok hidden"></span>
      <span id="statErr"   class="stat err hidden"></span>
      <button id="reportBtn" class="btn-report hidden">↓ Report</button>
    </div>

    <div id="reqList" class="req-list hidden"></div>

    <div class="section-head" id="varToggle">
      <span class="chevron" id="varChevron">▶</span>
      Variables
      <span id="varBadge" class="badge">0</span>
    </div>
    <div id="varBody" class="var-body hidden">
      <div class="env-bar">
        <select id="envSelect" class="env-select"></select>
        <button id="envAddBtn" class="env-btn" title="New environment">+</button>
        <button id="envDelBtn" class="env-btn env-del" title="Delete environment">−</button>
      </div>
      <textarea id="varEditor"
        placeholder="KEY=value&#10;BASE_URL=https://api.example.com&#10;TOKEN=secret"
        rows="4" spellcheck="false"></textarea>
      <div class="hint"><code>$shared</code> vars apply to all envs · <code>{{KEY}}</code> in requests</div>
    </div>

    <div id="emptyMsg" class="empty">
      <p>No HTTP requests detected on this page</p>
    </div>
  </div>
  <script type="module" src="./popup/index.ts"></script>
</body>
</html>
