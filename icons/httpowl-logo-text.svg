         C88 108 74 112 64 112
         C54 112 40 108 32 94
         C22 78 26 48 38 26 Z"/>
    <circle cx="48" cy="66" r="11" fill="#0f172a"/>
    <circle cx="80" cy="66" r="11" fill="#0f172a"/>
    <circle cx="51" cy="63" r="3.5" fill="#f8fafc" opacity="0.85"/>
    <circle cx="83" cy="63" r="3.5" fill="#f8fafc" opacity="0.85"/>
    <path fill="#f59e0b" d="M64 82 L58 90 L70 90 Z"/>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="260" y="124" fill="url(#wordmark)" font-size="72" font-weight="800" letter-spacing="-3">httpOwl</text>
    <text x="264" y="166" fill="#64748b" font-size="25" font-weight="600" letter-spacing="0.5">browser request runner</text>
    <path d="M264 186h184" stroke="#22d3ee" stroke-width="6" stroke-linecap="round"/>
    <path d="M470 186h36" stroke="#f59e0b" stroke-width="6" stroke-linecap="round"/>
