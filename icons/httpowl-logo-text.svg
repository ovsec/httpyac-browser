<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" role="img" aria-labelledby="title desc">
  <title id="title">httpOwl logo with wordmark</title>
  <desc id="desc">Minimal abstract owl icon beside the httpOwl wordmark.</desc>
  <defs>
    <linearGradient id="iconBg" x1="32" y1="24" x2="224" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#172554"/>
      <stop offset="0.6" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="128" y1="63" x2="128" y2="204" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ccfbf1"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="260" y1="78" x2="540" y2="149" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <rect width="720" height="240" rx="36" fill="#f8fafc"/>
  <rect x="32" y="24" width="192" height="192" rx="42" fill="url(#iconBg)"/>
  <g transform="translate(32, 24) scale(1.5)">
    <path fill="url(#faceGrad)"
